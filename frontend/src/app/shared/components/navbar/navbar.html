<nav class="bg-gradient-to-r from-blue-600 to-purple-700 text-white shadow-lg">
  <div class="max-w-7xl mx-auto px-4">
    <div class="flex justify-between items-center h-16">

      <!-- LOGO -->
      <a routerLink="/" class="font-bold text-2xl hover:text-blue-100 transition">
        FenixBd
      </a>

      <!-- DESKTOP MENU -->
      <div class="hidden md:flex items-center space-x-6">

        <a
          *ngIf="isAuthenticated$ | async"
          routerLink="/dashboard"
          routerLinkActive="text-yellow-300"
          class="hover:text-blue-100 transition"
        >
          Dashboard
        </a>

        <!-- ✅ Una sola condición por *ngIf, sin "as" ni "let" complejos -->
        <a
          *ngIf="isAdmin"
          routerLink="/usuarios"
          routerLinkActive="text-yellow-300"
          class="hover:text-blue-100 transition"
        >
          Usuarios
        </a>

        <a
          *ngIf="isSuperAdmin"
          routerLink="/admin/audit-logs"
          routerLinkActive="text-yellow-300"
          class="hover:text-blue-100 transition"
        >
          Auditoría
        </a>

      </div>

      <!-- PERFIL (si está autenticado) -->
      <div *ngIf="isAuthenticated$ | async" class="relative">
        <button
          (click)="toggleProfileMenu()"
          class="flex items-center space-x-2 hover:bg-white hover:bg-opacity-10 px-3 py-2 rounded-lg transition"
        >
          <!-- Avatar con iniciales -->
          <div class="w-8 h-8 bg-white bg-opacity-20 rounded-full flex items-center justify-center text-sm font-bold">
            {{ initials }}
          </div>
          <span class="hidden sm:block text-sm">{{ usuarioActual?.nombres }}</span>
          <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd"
              d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"
              clip-rule="evenodd"/>
          </svg>
        </button>

        <!-- DROPDOWN PERFIL -->
        <div
          *ngIf="isProfileMenuOpen"
          class="absolute right-0 mt-2 w-52 bg-white text-gray-800 rounded-lg shadow-xl z-50"
        >
          <!-- Info usuario -->
          <div class="px-4 py-3 border-b border-gray-100">
            <p class="text-sm font-semibold truncate">{{ usuarioActual?.email }}</p>
            <p class="text-xs text-gray-500 mt-1">{{ rolActual }}</p>
          </div>

          <!-- Links -->
          <a
            routerLink="/profile"
            (click)="closeMenus()"
            class="block px-4 py-2 text-sm hover:bg-gray-50 transition"
          >
            Mi Perfil
          </a>
          <a
            routerLink="/change-password"
            (click)="closeMenus()"
            class="block px-4 py-2 text-sm hover:bg-gray-50 transition"
          >
            Cambiar Contraseña
          </a>

          <!-- Logout -->
          <button
            (click)="onLogout()"
            class="w-full text-left px-4 py-2 text-sm text-red-600 font-semibold hover:bg-red-50 transition border-t border-gray-100"
          >
            Cerrar Sesión
          </button>
        </div>
      </div>

      <!-- LINKS si NO está autenticado -->
      <div *ngIf="!(isAuthenticated$ | async)" class="hidden md:flex items-center space-x-4">
        <a routerLink="/login" class="hover:text-blue-100 transition text-sm">
          Ingresar
        </a>
        <a
          routerLink="/register"
          class="bg-white text-blue-600 px-4 py-2 rounded-lg text-sm font-semibold hover:bg-opacity-90 transition"
        >
          Registrarse
        </a>
      </div>

      <!-- BOTÓN MENÚ MOBILE -->
      <button
        (click)="toggleMenu()"
        class="md:hidden p-2 hover:bg-white hover:bg-opacity-10 rounded-lg transition"
      >
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>

    </div>

    <!-- MENÚ MOBILE -->
    <div *ngIf="isMenuOpen" class="md:hidden pb-4 space-y-1 border-t border-white border-opacity-20 pt-3">

      <a
        *ngIf="isAuthenticated$ | async"
        routerLink="/dashboard"
        (click)="closeMenus()"
        class="block px-3 py-2 rounded-lg hover:bg-white hover:bg-opacity-10 transition text-sm"
      >
        Dashboard
      </a>

      <a
        *ngIf="isAdmin"
        routerLink="/usuarios"
        (click)="closeMenus()"
        class="block px-3 py-2 rounded-lg hover:bg-white hover:bg-opacity-10 transition text-sm"
      >
        Usuarios
      </a>

      <a
        *ngIf="isSuperAdmin"
        routerLink="/admin/audit-logs"
        (click)="closeMenus()"
        class="block px-3 py-2 rounded-lg hover:bg-white hover:bg-opacity-10 transition text-sm"
      >
        Auditoría
      </a>

      <a
        *ngIf="!(isAuthenticated$ | async)"
        routerLink="/login"
        (click)="closeMenus()"
        class="block px-3 py-2 rounded-lg hover:bg-white hover:bg-opacity-10 transition text-sm"
      >
        Ingresar
      </a>

      <a
        *ngIf="!(isAuthenticated$ | async)"
        routerLink="/register"
        (click)="closeMenus()"
        class="block px-3 py-2 bg-white text-blue-600 rounded-lg text-sm font-semibold"
      >
        Registrarse
      </a>

      <!-- Logout mobile -->
      <button
        *ngIf="isAuthenticated$ | async"
        (click)="onLogout()"
        class="w-full text-left px-3 py-2 rounded-lg text-red-200 hover:bg-white hover:bg-opacity-10 transition text-sm"
      >
        Cerrar Sesión
      </button>

    </div>
  </div>
</nav>
