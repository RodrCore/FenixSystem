<div class="tab-loading" *ngIf="loading">
  <div class="skel" style="height:90px"></div>
  <div class="skel" style="height:280px"></div>
</div>

<ng-container *ngIf="!loading && data">

  <!-- KPIs -->
  <div class="kpis-grid">
    <app-kpi-card
      label="Total clientes"
      [value]="data.kpis?.total_clientes || 0"
      color="#7C3AED" />

    <app-kpi-card
      label="Clientes nuevos"
      [value]="data.kpis?.nuevos_en_periodo || 0"
      subtext="en este período"
      color="#059669" />

    <app-kpi-card
      label="Inactivos (60+ días)"
      [value]="data.kpis?.clientes_inactivos || 0"
      color="#DC2626" />

    <app-kpi-card
      label="Activos en período"
      [value]="data.kpis?.clientes_activos || 0"
      subtext="con compras"
      color="#0891B2" />
  </div>

  <!-- Gráfico zonas + Top clientes -->
  <div class="grid-2">
    <div class="card" *ngIf="data.por_zona?.length > 0">
      <div class="card-title">Clientes por zona</div>
      <div class="chart-wrap chart-sm">
        <canvas #chartZonas></canvas>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Top 10 clientes (por compras)</div>
      <table class="rank-table">
        <thead>
          <tr>
            <th>#</th>
            <th>Cliente</th>
            <th>Compras</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let c of data.top_clientes; let i = index">
            <td class="rank-i">{{ i + 1 }}</td>
            <td>
              <div class="rank-name">{{ c.nombre }}</div>
              <div class="rank-code" *ngIf="c.zona && c.zona !== '-'">{{ c.zona }}</div>
            </td>
            <td class="td-num">{{ c.compras }}</td>
            <td class="td-money">Bs {{ fmtBs(c.total) }}</td>
          </tr>
          <tr *ngIf="data.top_clientes?.length === 0">
            <td colspan="4" class="empty">Sin datos para este período</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</ng-container>
