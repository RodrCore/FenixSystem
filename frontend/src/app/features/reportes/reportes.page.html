<div class="reportes-page">

  <!-- Header -->
  <div class="rep-header">
    <h1 class="rep-title">Reportes</h1>
    <p class="rep-subtitle">Dashboard y análisis del negocio</p>
  </div>

  <!-- Tabs de secciones -->
  <div class="tabs-wrap">
    <button *ngFor="let s of secciones"
      class="tab" [class.tab-active]="seccionActiva === s.v"
      (click)="cambiarSeccion(s.v)">
      <span class="tab-icon">{{ s.icon }}</span>
      <span>{{ s.n }}</span>
    </button>
  </div>

  <!-- Barra sticky de filtros + exportar -->
  <div class="filtros-bar">
    <app-filtros-fecha [filtro]="filtro" (filtroChange)="onFiltroChange($event)" />

    <div class="spacer"></div>

    <button class="btn-export btn-excel" (click)="exportar('excel')" [disabled]="exportando">
      <svg fill="none" stroke="currentColor" stroke-width="1.75"
        stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" width="14" height="14">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10 9 9 9 8 9"/>
      </svg>
      Excel
    </button>

    <button class="btn-export btn-pdf" (click)="exportar('pdf')" [disabled]="exportando">
      <svg fill="none" stroke="currentColor" stroke-width="1.75"
        stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" width="14" height="14">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
      </svg>
      PDF
    </button>
  </div>

  <!-- Contenido del tab activo -->
  <div class="rep-body">
    <app-tab-ventas             *ngIf="seccionActiva === 'ventas'"            [filtro]="filtro" />
    <app-tab-pedidos            *ngIf="seccionActiva === 'pedidos'"           [filtro]="filtro" />
    <app-tab-reabastecimientos  *ngIf="seccionActiva === 'reabastecimientos'" [filtro]="filtro" />
    <app-tab-inventario         *ngIf="seccionActiva === 'inventario'"        [filtro]="filtro" />
    <app-tab-comercial          *ngIf="seccionActiva === 'comercial'"         [filtro]="filtro" />
    <app-tab-clientes           *ngIf="seccionActiva === 'clientes'"          [filtro]="filtro" />
  </div>
</div>
