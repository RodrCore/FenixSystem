<div class="min-h-screen bg-gradient-to-br from-green-500 via-blue-500 to-purple-600 flex items-center justify-center p-4 py-8">
  <div class="bg-white rounded-lg shadow-2xl w-full max-w-2xl p-8">
    <!-- HEADER -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-gray-800 mb-2">Crear Cuenta</h1>
      <p class="text-gray-600">Únete a FenixBd - Sistema de Gestión Comercial</p>
    </div>

    <!-- FORM -->
    <form [formGroup]="registerForm" (ngSubmit)="onRegister()" class="space-y-4">
      <!-- ROW: NOMBRES Y APELLIDO PATERNO -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <!-- NOMBRES -->
        <div>
          <label for="nombres" class="block text-sm font-medium text-gray-700 mb-1">
            Nombres *
          </label>
          <input
            id="nombres"
            type="text"
            formControlName="nombres"
            placeholder="Juan"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition"
            [class.border-red-500]="registerForm.get('nombres')?.hasError('required') && registerForm.get('nombres')?.touched"
          />
          <p class="text-red-500 text-xs mt-1" *ngIf="registerForm.get('nombres')?.touched && nombresError">
            {{ nombresError }}
          </p>
        </div>

        <!-- APELLIDO PATERNO -->
        <div>
          <label for="apellido_paterno" class="block text-sm font-medium text-gray-700 mb-1">
            Apellido Paterno *
          </label>
          <input
            id="apellido_paterno"
            type="text"
            formControlName="apellido_paterno"
            placeholder="Pérez"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition"
            [class.border-red-500]="registerForm.get('apellido_paterno')?.hasError('required') && registerForm.get('apellido_paterno')?.touched"
          />
          <p class="text-red-500 text-xs mt-1" *ngIf="registerForm.get('apellido_paterno')?.touched && apellidoPaternoError">
            {{ apellidoPaternoError }}
          </p>
        </div>
      </div>

      <!-- ROW: APELLIDO MATERNO Y TELÉFONO -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <!-- APELLIDO MATERNO -->
        <div>
          <label for="apellido_materno" class="block text-sm font-medium text-gray-700 mb-1">
            Apellido Materno
          </label>
          <input
            id="apellido_materno"
            type="text"
            formControlName="apellido_materno"
            placeholder="García"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition"
          />
        </div>

        <!-- TELÉFONO -->
        <div>
          <label for="telefono" class="block text-sm font-medium text-gray-700 mb-1">
            Teléfono
          </label>
          <input
            id="telefono"
            type="tel"
            formControlName="telefono"
            placeholder="+56912345678"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition"
          />
        </div>
      </div>

      <!-- EMAIL -->
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">
          Email *
        </label>
        <input
          id="email"
          type="email"
          formControlName="email"
          placeholder="tu@email.com"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition"
          [class.border-red-500]="registerForm.get('email')?.hasError('required') && registerForm.get('email')?.touched"
        />
        <p class="text-red-500 text-xs mt-1" *ngIf="registerForm.get('email')?.touched && emailError">
          {{ emailError }}
        </p>
      </div>

      <!-- NÚMERO DE EMPLEADO -->
      <div>
        <label for="numero_empleado" class="block text-sm font-medium text-gray-700 mb-1">
          Número de Empleado
        </label>
        <input
          id="numero_empleado"
          type="text"
          formControlName="numero_empleado"
          placeholder="EMP001"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition"
        />
      </div>

      <!-- ROW: CONTRASEÑA Y CONFIRMAR -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <!-- CONTRASEÑA -->
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
            Contraseña *
          </label>
          <div class="relative">
            <input
              id="password"
              [type]="showPassword ? 'text' : 'password'"
              formControlName="password"
              placeholder="••••••••"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition pr-10"
              [class.border-red-500]="registerForm.get('password')?.hasError('required') && registerForm.get('password')?.touched"
            />
            <button
              type="button"
              (click)="togglePasswordVisibility()"
              class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-gray-700"
            >
              <svg *ngIf="!showPassword" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
              </svg>
              <svg *ngIf="showPassword" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-4.803m5.596-3.856a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zM19.35 13.5H23m-2.1-2.1h2.1"></path>
              </svg>
            </button>
          </div>
          <p class="text-red-500 text-xs mt-1" *ngIf="registerForm.get('password')?.touched && passwordError">
            {{ passwordError }}
          </p>
        </div>

        <!-- CONFIRMAR CONTRASEÑA -->
        <div>
          <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-1">
            Confirmar Contraseña *
          </label>
          <div class="relative">
            <input
              id="confirmPassword"
              [type]="showConfirmPassword ? 'text' : 'password'"
              formControlName="confirmPassword"
              placeholder="••••••••"
              class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent transition pr-10"
              [class.border-red-500]="registerForm.get('confirmPassword')?.hasError('required') && registerForm.get('confirmPassword')?.touched"
            />
            <button
              type="button"
              (click)="toggleConfirmPasswordVisibility()"
              class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-gray-700"
            >
              <svg *ngIf="!showConfirmPassword" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
              </svg>
              <svg *ngIf="showConfirmPassword" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-4.803m5.596-3.856a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zM19.35 13.5H23m-2.1-2.1h2.1"></path>
              </svg>
            </button>
          </div>
          <p class="text-red-500 text-xs mt-1" *ngIf="registerForm.get('confirmPassword')?.touched && confirmPasswordError">
            {{ confirmPasswordError }}
          </p>
        </div>
      </div>

      <!-- ERROR MESSAGE -->
      <div *ngIf="error$ | async as error" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded text-sm">
        {{ error }}
      </div>

      <!-- ACCEPT TERMS -->
      <div class="flex items-start">
        <input
          id="acceptTerms"
          type="checkbox"
          formControlName="acceptTerms"
          class="mt-1 rounded border-gray-300"
        />
        <label for="acceptTerms" class="ml-2 text-sm text-gray-600">
          Aceptar
          <a href="#" class="text-blue-500 hover:text-blue-700 font-semibold">
            términos y condiciones
          </a>
          *
        </label>
      </div>
      <p class="text-red-500 text-xs" *ngIf="registerForm.get('acceptTerms')?.touched && acceptTermsError">
        {{ acceptTermsError }}
      </p>

      <!-- REGISTER BUTTON -->
      <button
        type="submit"
        [disabled]="registerForm.invalid || (isLoading$ | async)"
        class="w-full bg-gradient-to-r from-green-500 to-blue-600 text-white font-semibold py-2 px-4 rounded-lg hover:shadow-lg transition duration-300 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center"
      >
        <span *ngIf="!(isLoading$ | async)">Registrarse</span>
        <span *ngIf="isLoading$ | async" class="flex items-center">
          <svg class="animate-spin h-5 w-5 mr-3" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          Registrando...
        </span>
      </button>
    </form>

    <!-- FOOTER -->
    <div class="mt-6 text-center">
      <p class="text-gray-600 text-sm">
        ¿Ya tienes cuenta?
        <a routerLink="/login" class="text-blue-500 hover:text-blue-700 font-semibold">
          Inicia sesión aquí
        </a>
      </p>
    </div>
  </div>
</div>
