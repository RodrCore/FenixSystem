<ion-header [translucent]="false">
  <ion-toolbar>
    <!-- Botón atrás -->
    <ion-buttons slot="start" *ngIf="mostrarBack">
      <ion-button (click)="goBack()">
        <svg
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          viewBox="0 0 24 24"
          width="20"
          height="20"
          aria-label="Volver"
        >
          <path d="m15 18-6-6 6-6" />
        </svg>
      </ion-button>
    </ion-buttons>

    <!-- Avatar + nombre cuando mostrarPerfil -->
    <button class="user-info-btn" (click)="irAPerfil()" *ngIf="mostrarPerfil">
      <div class="ui-avatar">
        <img *ngIf="avatarUrl" [src]="avatarUrl" alt="" /> 
        <span *ngIf="!avatarUrl" class="ui-iniciales">{{ iniciales }}</span>
      </div>
      <span class="ui-nombre">{{ nombreCorto }}</span>
    </button>

    <!-- Título centrado -->
    <div class="nav-title" *ngIf="!mostrarPerfil || mostrarBack">
      {{ titulo }}
    </div>

    <!-- Botones derecha -->
    <ion-buttons slot="end">
      <!-- Botón logout -->
      <ion-button (click)="confirmarLogout()" *ngIf="mostrarPerfil">
        <svg
          fill="none"
          stroke="currentColor"
          stroke-width="1.75"
          stroke-linecap="round"
          stroke-linejoin="round"
          viewBox="0 0 24 24"
          width="20"
          height="20"
          aria-label="Cerrar sesión"
        >
          <path
            d="M14 8v-2a2 2 0 0 0 -2 -2h-7a2 2 0 0 0 -2 2v12a2 2 0 0 0 2 2h7a2 2 0 0 0 2 -2v-2"
          />
          <path d="M9 12h12l-3 -3" />
          <path d="M18 15l3 -3" />
        </svg>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>
