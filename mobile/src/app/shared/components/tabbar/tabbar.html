<div class="tabbar" [class.hidden]="isHidden">
  <button *ngFor="let t of tabs"
    class="tab-item"
    [class.active]="tab === t.id"
    (click)="go(t)">
 
    <!-- Icono dashboard -->
    <svg *ngIf="t.id === 'dashboard'" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" width="22" height="22">
      <path d="M5 12l-2 0l9 -9l9 9l-2 0"/>
      <path d="M5 12v7a2 2 0 0 0 2 2h10a2 2 0 0 0 2 -2v-7"/>
      <path d="M9 21v-6a2 2 0 0 1 2 -2h2a2 2 0 0 1 2 2v6"/>
    </svg>
 
    <!-- Icono productos -->
    <svg *ngIf="t.id === 'productos'" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" width="22" height="22">
      <path d="M12 3l8 4.5l0 9l-8 4.5l-8 -4.5l0 -9l8 -4.5"/>
      <path d="M12 12l8 -4.5"/>
      <path d="M12 12l0 9"/>
      <path d="M12 12l-8 -4.5"/>
    </svg>
 
    <!-- Icono clientes -->
    <svg *ngIf="t.id === 'clientes'" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" width="22" height="22">
      <path d="M9 7m-4 0a4 4 0 1 0 8 0a4 4 0 1 0 -8 0"/>
      <path d="M3 21v-2a4 4 0 0 1 4 -4h4a4 4 0 0 1 4 4v2"/>
      <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      <path d="M21 21v-2a4 4 0 0 0 -3 -3.85"/>
    </svg>
 
    <!-- Icono ventas -->
    <svg *ngIf="t.id === 'ventas'" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" width="22" height="22">
      <path d="M9 5h-2a2 2 0 0 0 -2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2 -2v-12a2 2 0 0 0 -2 -2h-2"/>
      <path d="M9 3m0 2a2 2 0 0 1 2 -2h2a2 2 0 0 1 2 2v0a2 2 0 0 1 -2 2h-2a2 2 0 0 1 -2 -2z"/>
      <path d="M9 12h6"/>
      <path d="M9 16h6"/>
    </svg>
 
    <!-- Icono pedidos (camión) -->
    <svg *ngIf="t.id === 'pedidos'" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" width="22" height="22">
      <path d="M7 17m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"/>
      <path d="M17 17m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"/>
      <path d="M5 17h-2v-6l2-5h9l4 5h1a2 2 0 0 1 2 2v4h-2m-4 0h-6m-6-6h15m-6 0v-5"/>
    </svg>
 
    <!-- Icono usuarios -->
    <svg *ngIf="t.id === 'usuarios'" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" width="22" height="22">
      <path d="M9 7m-4 0a4 4 0 1 0 8 0a4 4 0 1 0 -8 0"/>
      <path d="M3 21v-2a4 4 0 0 1 4 -4h4a4 4 0 0 1 4 4v2"/>
      <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      <path d="M21 21v-2a4 4 0 0 0 -3 -3.85"/>
    </svg>
 
    <!-- Icono reportes/auditoría -->
    <svg *ngIf="t.id === 'reportes'" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" width="22" height="22">
      <path d="M14 3v4a1 1 0 0 0 1 1h4"/>
      <path d="M17 21h-10a2 2 0 0 1 -2 -2v-14a2 2 0 0 1 2 -2h7l5 5v11a2 2 0 0 1 -2 2z"/>
      <path d="M9 17v-1m3 1v-3m3 3v-5"/>
    </svg>
 
    <span class="tab-lbl">{{ t.label }}</span>
    <span class="tab-pip" *ngIf="tab === t.id"></span>
  </button>
</div>
